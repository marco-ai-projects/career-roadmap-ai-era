<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Career Heatmap — Workforce Displacement Pressure Dashboard</title>
    <meta
      name="description"
      content="Research-backed dashboard mapping AI displacement pressure across 824 U.S. occupations. Built for strategic workforce planning."
    />
    <script>
      (function () {
        try {
          var forcedTheme = new URLSearchParams(window.location.search).get("theme");
          var savedTheme = localStorage.getItem("career-heatmap-theme");
          var theme = forcedTheme || savedTheme || "light";
          document.documentElement.dataset.theme = theme;
        } catch (error) {
          document.documentElement.dataset.theme = "light";
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
